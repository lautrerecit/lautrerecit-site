<meta charset="utf-8">
<!-- ============================================================
     L'AUTRE RÉCIT — Volet de marque « Connexion » · PREMIUM NOIR
     OÙ : page de connexion de l'espace membre. Colle ce bloc à GAUCHE du formulaire natif.
     Sinon, applique brand.css (le formulaire passe aux couleurs L'Autre Récit).
     ============================================================ -->
<div class="lr-sys lr-log">
  <style>
  .lr-log{--cr:#F2EDE4;--or:#9A7B2E;--or2:#C4A24A;--or3:#D4B05A;--ink:#0E0C0A;
    --serif:'Playfair Display',Georgia,serif;--sans:'League Spartan',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
    background:#0E0C0A;color:var(--cr);font-family:var(--sans);
    padding:clamp(40px,4.5vw,64px);border-radius:16px;position:relative;overflow:hidden;
    min-height:440px;display:flex;flex-direction:column;justify-content:space-between;gap:38px}
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700;1,900&family=League+Spartan:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');
  .lr-log *{box-sizing:border-box}
  .lr-log::before{content:"";position:absolute;inset:0;background:radial-gradient(95% 70% at 15% 8%,rgba(196,162,74,.17),transparent 55%);pointer-events:none}
  .lr-log .z{position:relative}
  .lr-log .wm{font-family:var(--serif);font-style:italic;font-weight:700;color:var(--cr);font-size:25px;letter-spacing:.01em}
  .lr-log .wm b{color:var(--or2);font-weight:700}
  .lr-log .eye{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--or3);margin:0 0 16px}
  .lr-log .tag{font-family:var(--serif);font-weight:700;font-size:clamp(21px,2.6vw,31px);color:var(--cr);max-width:25ch;line-height:1.3;margin:0}
  .lr-log .tag em{font-style:italic;font-weight:900;background:linear-gradient(180deg,#F6DE94,#D9B45C 52%,#C4A24A);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
  .lr-log .dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(180deg,#EBCB70,#A9863A);margin:20px 0;box-shadow:0 0 0 1px rgba(196,162,74,.5),0 0 0 6px rgba(196,162,74,.12)}
  .lr-log .foot{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--or3)}
  </style>
  <div class="z"><span class="wm">L'<b>Autre</b> Récit</span></div>
  <div class="z">
    <p class="eye">L'espace des élèves</p>
    <p class="tag">Reprendre le contrôle du <em>récit</em>, c'est arracher la <em>plume</em> à ceux qui l'ont <em>confisquée</em>.</p>
    <div class="dot"></div>
  </div>
  <div class="z foot">Connecte-toi pour reprendre ta formation</div>
</div>
